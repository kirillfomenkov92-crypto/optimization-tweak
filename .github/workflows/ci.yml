name: CI (проверка на Windows)

# 1) check-on-windows — проверка скрипта на настоящем Windows:
#      синтаксис, PSScriptAnalyzer, дымовой прогон -DryRun.
# 2) build-exe — сборка .exe через ps2exe (после успешной проверки);
#      артефакт всегда, публикация в Releases — при пуше в main.

on:
  push:
    branches: [ main, 'claude/**' ]
    tags: [ 'v*' ]            # тег vX.Y.Z публикует версионный релиз
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # нужно для публикации Release

jobs:
  check-on-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Синтаксический разбор (Parser)
        shell: pwsh
        run: |
          $path = Join-Path $PWD 'Optimize-WeakPC.ps1'
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$null, [ref]$errors)
          if ($errors -and $errors.Count -gt 0) {
            foreach ($e in $errors) {
              Write-Host "::error file=Optimize-WeakPC.ps1,line=$($e.Extent.StartLineNumber)::$($e.Message)"
            }
            throw "Найдено синтаксических ошибок: $($errors.Count)"
          }
          Write-Host "Синтаксис OK — ошибок парсинга нет."

      - name: Установка PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Import-Module PSScriptAnalyzer

      - name: Статический анализ (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $res = Invoke-ScriptAnalyzer -Path .\Optimize-WeakPC.ps1 `
                   -Severity Error,Warning `
                   -ExcludeRule PSAvoidUsingWriteHost
          if ($res) { $res | Format-Table -AutoSize | Out-String | Write-Host }
          $errors = @($res | Where-Object Severity -eq 'Error')
          foreach ($r in $res) {
            $lvl = if ($r.Severity -eq 'Error') { 'error' } else { 'warning' }
            Write-Host "::$lvl file=Optimize-WeakPC.ps1,line=$($r.Line)::[$($r.RuleName)] $($r.Message)"
          }
          if ($errors.Count -gt 0) { throw "PSScriptAnalyzer: ошибок $($errors.Count)" }
          Write-Host "Статический анализ пройден (ошибок уровня Error нет)."

      - name: Дымовой прогон -DryRun (ничего не меняет)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & powershell -NoProfile -ExecutionPolicy Bypass -File .\Optimize-WeakPC.ps1 -DryRun
          if ($LASTEXITCODE -ne 0) { throw "Скрипт завершился с кодом $LASTEXITCODE" }
          Write-Host "Дымовой прогон -DryRun завершён успешно."

      - name: Загрузка лога как артефакта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimize-dryrun-log
          path: C:\OptimizeLog\*.log
          if-no-files-found: ignore

  build-exe:
    needs: check-on-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Сборка .exe (ps2exe)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser
          Import-Module ps2exe
          # -requireAdmin вшивает манифест: при запуске .exe сразу появляется UAC.
          # Метаданные латиницей, чтобы не было проблем с кодировкой в ресурсах.
          Invoke-ps2exe `
            -inputFile  .\Optimize-WeakPC.ps1 `
            -outputFile .\Optimize-WeakPC.exe `
            -iconFile   .\assets\app.ico `
            -requireAdmin `
            -title 'Optimize WeakPC' `
            -product 'Optimize-WeakPC' `
            -company 'optimikzaion-for-vadik' `
            -version '1.0.0.0' `
            -description 'Optimize weak PC for Windows 10/11'
          if (-not (Test-Path .\Optimize-WeakPC.exe)) { throw "Сборка .exe не удалась" }
          Get-Item .\Optimize-WeakPC.exe | Format-List Name,Length

      - name: Артефакт .exe
        uses: actions/upload-artifact@v4
        with:
          name: Optimize-WeakPC-exe
          path: Optimize-WeakPC.exe
          if-no-files-found: error

      - name: Публикация в Releases (main -> app-latest, тег -> версия)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag   = $env:GITHUB_REF_NAME                      # например v1.0.0
            $title = "Optimize-WeakPC $tag"
            $latest = $false
          } else {
            $tag   = 'app-latest'
            $title = "Optimize-WeakPC (приложение, последняя сборка)"
            $latest = $true
          }
          $notes = "Готовый .exe приложения Optimize-WeakPC. При запуске запросит права администратора (UAC) и предложит режим: Проверка или Оптимизация."
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "$title" --notes "$notes" --latest=$latest
          }
          gh release upload $tag .\Optimize-WeakPC.exe --clobber
          Write-Host "Релиз $tag обновлён."
