name: TurboDebloat CI (Windows)

# 1) check — компиляция, импорт ядра, список шагов, СУХОЙ прогон (без изменений).
# 2) build-exe — импорт GUI + сборка TurboDebloat.exe; релиз при пуше в main.
# Реальное применение (--apply) в CI НЕ запускается.

on:
  push:
    branches: [ main, 'claude/**' ]
    paths: [ 'turbo_debloat/**', '.github/workflows/turbo-ci.yml' ]
  pull_request:
    paths: [ 'turbo_debloat/**', '.github/workflows/turbo-ci.yml' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Компиляция
        run: python -m compileall -q turbo_debloat
      - name: Смоук-импорт ядра
        run: python -c "import sys; sys.path.insert(0,'.'); from turbo_debloat.core.engine import PlaybookEngine, iter_steps, load_playbook; from turbo_debloat.core import safety, compat_check, backup, restore; print('CORE OK')"
      - name: Все профили — список + сухой прогон
        run: |
          foreach ($p in @('compatible_fast','gaming','ultra')) {
            python -m turbo_debloat.main --playbook $p --list
            python -m turbo_debloat.main --playbook $p
          }

  build-exe:
    needs: check
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r turbo_debloat/requirements.txt
      - name: Смоук-импорт GUI
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "import sys; sys.path.insert(0,'.'); import turbo_debloat.ui.main_window, turbo_debloat.ui.worker; print('GUI IMPORT OK')"
      - name: Сборка .exe
        run: python turbo_debloat/build.py
      - name: Артефакт .exe
        uses: actions/upload-artifact@v4
        with:
          name: TurboDebloat-exe
          path: dist/TurboDebloat.exe
          if-no-files-found: error
      - name: Публикация в Releases (только main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = 'turbo-app-latest'
          $notes = "TurboDebloat (PyQt6). Деблоат Windows: Турбо/Геймер/Ультра. Defender/Store/Обновления сохраняются. Бэкап и откат встроены. При запуске запросит права администратора."
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) { gh release create $tag --title "TurboDebloat (app)" --notes "$notes" }
          gh release upload $tag .\dist\TurboDebloat.exe --clobber
          Write-Host "Релиз $tag обновлён."
