name: Optimizer App CI (Windows)

# Проверка и сборка PyQt6-приложения windows_optimizer на настоящем Windows:
#   - компиляция всех модулей (синтаксис);
#   - смоук-импорт ядра и UI (без открытия окон);
#   - сборка .exe через PyInstaller (артефакт; релиз — при пуше в main).

on:
  push:
    branches: [ main, 'claude/**' ]
    paths: [ 'windows_optimizer/**', '.github/workflows/optimizer-ci.yml' ]
  pull_request:
    paths: [ 'windows_optimizer/**', '.github/workflows/optimizer-ci.yml' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      # Консоль Windows по умолчанию cp1252 — кириллица в print/логах ломает её.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    defaults:
      run:
        working-directory: windows_optimizer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Компиляция (синтаксис всех модулей)
        run: python -m compileall -q app main.py build.py

      - name: Смоук-импорт ядра и модулей
        run: |
          python -c "import sys; sys.path.insert(0,'.'); from app.core import logger, system_info, optimizer, backup; from app.utils import admin, registry_helper; from app.modules.registry import RegistryModule; from app.modules.startup import StartupModule; m=RegistryModule(); assert m.tweaks, 'tweaks db empty'; print('tweaks:', len(m.tweaks)); StartupModule().scan(); print('CORE OK')"

      - name: Смоук-импорт встроенного деблоата + playbook'и
        run: |
          python -c "import sys; sys.path.insert(0,'.'); from app.debloat.engine import PlaybookEngine, iter_steps, load_playbook; from app.debloat import safety; from app.utils.resources import resource_path; import glob,pathlib; d=resource_path('app','debloat','playbooks'); fs=sorted(glob.glob(str(d/'*.json'))); assert len(fs)==3, fs; [iter_steps(load_playbook(pathlib.Path(f))) for f in fs]; assert safety.is_protected_service('WUAUSERV'); print('DEBLOAT OK:', len(fs), 'playbooks')"

      - name: Смоук-импорт UI (без QApplication)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import sys; sys.path.insert(0,'.'); import app.ui.dashboard, app.ui.main_window; print('UI IMPORT OK')"

      - name: Тесты защиты служб
        run: python tests/test_services_protection.py

      - name: Тесты защиты деблоата
        run: python tests/test_debloat_safety.py

      - name: Тесты отката деблоата
        run: python tests/test_debloat_restore.py

      - name: Тесты применятеля твиков
        run: python tests/test_tweak_applier.py

      - name: Тесты OperationResult
        run: python tests/test_operation_result.py

      - name: Сборка .exe (PyInstaller)
        run: python build.py

      - name: Артефакт .exe
        uses: actions/upload-artifact@v4
        with:
          name: WindowsOptimizerPro-exe
          path: windows_optimizer/dist/WindowsOptimizerPro.exe
          if-no-files-found: error

      - name: Публикация в Releases (только main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = 'optimizer-app-latest'
          $notes = "Windows Optimizer Pro (PyQt6) — последняя сборка из main. Запросит права администратора при запуске."
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Windows Optimizer Pro (app)" --notes "$notes"
          }
          gh release upload $tag .\dist\WindowsOptimizerPro.exe --clobber
          Write-Host "Релиз $tag обновлён."
